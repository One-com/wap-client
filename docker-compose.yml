services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wap
      POSTGRES_PASSWORD: wap
      POSTGRES_DB: wap
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wap"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  py-app:
    build:
      context: ./py-backend
      target: dev
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # asyncpg scheme required for SQLAlchemy async; beats the .env value
      DATABASE_URL: postgresql+asyncpg://wap:wap@postgres:5432/wap
      REDIS_URL: redis://redis:6379
    volumes:
      # Hot-reload: only mount the app package, not the whole directory
      - ./py-backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
