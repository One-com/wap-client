apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wap-ingress-public-${RELEASE_ENVIRONMENT}
  namespace: ${K8S_NAMESPACE}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    kubernetes.io/ingress.class: public-default-ingress
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  labels:
    app: wap
    environment: ${RELEASE_ENVIRONMENT}
spec:
  rules:
    # Public API surface only: /api/v1/* and /health. /admin/* is intentionally
    # not routed here, so nginx returns 404 for it on the public host.
    - host: ${K8S_NAMESPACE}.public-default.k8spod4-cph3.ingress.k8s.g1i.one
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: wap-${RELEASE_ENVIRONMENT}
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: wap-${RELEASE_ENVIRONMENT}
                port:
                  number: 80
  tls:
    - hosts:
        - ${K8S_NAMESPACE}.public-default.k8spod4-cph3.ingress.k8s.g1i.one
      secretName: wap-ingress-public-${RELEASE_ENVIRONMENT}
