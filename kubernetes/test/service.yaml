kind: Service
apiVersion: v1
metadata:
  name: wap-${RELEASE_ENVIRONMENT}
  namespace: ${K8S_NAMESPACE}
  labels:
    app: wap
    environment: ${RELEASE_ENVIRONMENT}
spec:
  selector:
    app.kubernetes.io/name: wap-app-${RELEASE_ENVIRONMENT}
  ports:
    - protocol: TCP
      name: http
      port: 80
      targetPort: 8000
