<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WAP Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
            <span class="font-semibold text-gray-800">WAP Admin</span>
            <div class="flex gap-6 text-sm">
                <a href="/admin/ui/agents" class="text-gray-600 hover:text-gray-900 {% if request.url.path.startswith('/admin/ui/agents') %}font-medium text-gray-900{% endif %}">Agents</a>
                <a href="/admin/ui/roles" class="text-gray-600 hover:text-gray-900 {% if request.url.path == '/admin/ui/roles' %}font-medium text-gray-900{% endif %}">Roles</a>
                <a href="/admin/ui/chat" class="text-gray-600 hover:text-gray-900 {% if request.url.path == '/admin/ui/chat' %}font-medium text-gray-900{% endif %}">Chat</a>
                <a href="/admin/ui/snippets" class="text-gray-600 hover:text-gray-900 {% if request.url.path == '/admin/ui/snippets' %}font-medium text-gray-900{% endif %}">Snippets</a>
                <a href="/admin/ui/allowlist" class="text-gray-600 hover:text-gray-900 {% if request.url.path == '/admin/ui/allowlist' %}font-medium text-gray-900{% endif %}">WP hostname allowlist</a>
            </div>
            <div class="text-sm text-gray-500">
                {{ session.email }}
                <a href="/admin/logout" class="ml-4 text-red-500 hover:text-red-700">Logout</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
