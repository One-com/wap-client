<div id="agent-form" class="bg-white rounded-lg shadow p-6">
    <h2 class="text-lg font-medium mb-4 text-gray-800">
        {% if agent %}Edit Agent: <span class="font-mono text-base">{{ agent.slug }}</span>{% else %}Create New Agent{% endif %}
    </h2>
    <form
        hx-ext="json-enc"
        {% if agent %}
            hx-put="/admin/agents/{{ agent.id }}"
        {% else %}
            hx-post="/admin/agents"
        {% endif %}
        hx-target="#agents-table-body"
        hx-swap="outerHTML"
        hx-on::after-request="if(event.detail.successful){ document.getElementById('agent-form').remove(); htmx.ajax('GET', '/admin/ui/agents', {target: 'body', swap: 'outerHTML'}); }"
        class="grid grid-cols-2 gap-4">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
            <input type="text" name="slug" value="{{ agent.slug if agent else '' }}" required
                placeholder="wp-rocket-v2"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" name="name" value="{{ agent.name if agent else '' }}" required
                placeholder="WP Rocket Assistant v2"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Product Slug</label>
            <input type="text" name="productSlug" value="{{ agent.productSlug if agent else '' }}" required
                placeholder="wp-rocket"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Model</label>
            <input type="text" name="model" value="{{ agent.model if agent else 'claude-sonnet-4-6' }}" required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Temperature <span class="text-gray-400 font-normal">(0.0–1.0)</span></label>
            <input type="number" step="0.1" min="0" max="1" name="temperature"
                value="{{ agent.temperature if agent else '0.3' }}"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Max Turns <span class="text-gray-400 font-normal">(1–100)</span></label>
            <input type="number" min="1" max="100" name="maxTurns"
                value="{{ agent.maxTurns if agent else '25' }}"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">System Prompt</label>
            <textarea name="systemPrompt" rows="10" required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">{{ agent.systemPrompt if agent else '' }}</textarea>
        </div>
        <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">Tools</label>
            <div class="space-y-2">
                {% for tool in tool_catalog %}
                <label class="flex items-start gap-2 text-sm text-gray-700 cursor-pointer">
                    <input type="checkbox"
                           class="tool-checkbox mt-0.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500"
                           data-descriptor='{{ tool.descriptor | tojson }}'
                           {% if tool.id in agent_tool_ids %}checked{% endif %}>
                    <span>
                        <span class="font-medium">{{ tool.label }}</span>
                        <span class="text-gray-400"> — {{ tool.description }}</span>
                    </span>
                </label>
                {% endfor %}
                {% for unknown in agent_unknown_tools %}
                <label class="flex items-start gap-2 text-sm text-gray-400 cursor-not-allowed">
                    <input type="checkbox" checked disabled class="mt-0.5 rounded border-gray-300">
                    <span>
                        <span class="font-medium text-amber-600">Unknown tool</span>
                        <code class="text-xs bg-gray-100 px-1 rounded">{{ unknown | tojson }}</code>
                        <span class="text-gray-400"> — not available in this version, will be preserved</span>
                    </span>
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="col-span-2 flex gap-3 justify-end pt-2 border-t border-gray-100">
            <button type="button"
                onclick="document.getElementById('agent-form').remove()"
                class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded hover:bg-gray-50 transition-colors">
                Cancel
            </button>
            <button type="submit"
                class="px-4 py-2 text-sm text-white bg-blue-600 rounded hover:bg-blue-700 transition-colors">
                {% if agent %}Save Changes{% else %}Create Agent{% endif %}
            </button>
        </div>
    </form>
    <script>
    (function() {
        var form = document.querySelector('#agent-form form');
        form.addEventListener('htmx:configRequest', function(evt) {
            var tools = [];
            document.querySelectorAll('#agent-form .tool-checkbox:checked').forEach(function(cb) {
                tools.push(JSON.parse(cb.dataset.descriptor));
            });
            {% if agent_unknown_tools %}
            var unknown = {{ agent_unknown_tools | tojson }};
            tools = tools.concat(unknown);
            {% endif %}
            evt.detail.parameters['tools'] = tools.length ? tools : null;
        });
    })();
    </script>
</div>
